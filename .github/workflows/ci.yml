name: CI

on:
  push:
    branches: [main]
    # Docs-only pushes don't change the image — skip the build (faster, cheaper).
    # A push that also touches code still runs (paths-ignore only skips if ALL match).
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "knowledge/**"
  pull_request:
  workflow_dispatch: # allow manual image rebuilds without a new commit

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: apps/api/go.sum
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  contract:
    name: Contract (OpenAPI → TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api-contract
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Ensure the committed client is in sync with the spec.
      - run: |
          npx -y openapi-typescript@7 openapi.yaml -o generated/ts/schema.d.ts
          git diff --exit-code generated/ts/schema.d.ts

  web:
    name: Web (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # npm workspaces: lockfile & install at root, run scripts per workspace.
      - run: npm ci
      - run: npm run lint -w @elkasir/web
      - run: npm run build -w @elkasir/web

  # Build & push the one-container image to GHCR — ONLY after all gates pass, and
  # only on push to main (not PRs). The image embeds the SPA into the Go binary;
  # the server just pulls it (see docs/DEPLOYMENT_PIPELINE.md). GHCR requires
  # lowercase: owner AmandaYora -> amandayora.
  image:
    name: Build & push image (GHCR)
    needs: [api, contract, web]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # built-in, no PAT needed to push
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/amandayora/elkasir-web:latest
            ghcr.io/amandayora/elkasir-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
