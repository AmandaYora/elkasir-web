# Optional host reverse proxy for the single app container.
# The app already serves the SPA and /api/v1 on one port (8081), so the proxy only
# needs to terminate TLS and forward everything. Place on the VPS host (not in Docker).
server {
    listen 80;
    server_name elkasir.example.com;

    # Redirect to HTTPS (enable after issuing a certificate, e.g. via certbot).
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
