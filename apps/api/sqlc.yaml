version: "2"
sql:
  - engine: "mysql"
    # Skema dibaca dari migrasi golang-migrate; berkas *.down.sql diabaikan sqlc.
    schema: "db/migrations"
    queries: "db/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/platform/db/sqlcgen"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: false
        json_tags_case_style: "camel"
        overrides:
          - db_type: "datetime"
            go_type: "time.Time"
          - db_type: "datetime"
            nullable: true
            go_type:
              import: "database/sql"
              type: "NullTime"
