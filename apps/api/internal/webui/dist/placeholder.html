<!doctype html>

    <title>Elkasir — API</title>
    <style>
      :root { color-scheme: light dark; }
      body {

  <body>
    <div class="card">
      <h1>Elkasir API is running</h1>

      <p>Build &amp; embed the frontend with <code>npm run build</code>, then restart.</p>
